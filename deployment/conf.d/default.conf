server {
	listen      80;
	server_name localhost fraugsleeves.dev staging.fraugsleeves.dev;
	root        /usr/share/nginx/html;
	index       index.html;

	include includes/block.conf;

	error_page             404  =404  /404.html;
	proxy_intercept_errors on;

	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	location ~* \.(woff|woff2)$ {
		add_header Access-Control-Allow-Origin "*";
		add_header Cache-Control "public, immutable, max-age=604800";
		add_header Cloudflare-CDN-Cache-Control "s-maxage=604800, stale-while-revalidate=86400, stale-if-error=86400";
	}

	location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|webmanifest)$ {
		add_header Cache-Control "public, immutable, max-age=604800";
		add_header Cloudflare-CDN-Cache-Control "s-maxage=604800, stale-while-revalidate=86400, stale-if-error=86400";
	}

	location / {
		try_files $uri $uri.html $uri/ =404;
		add_header Cache-Control "no-cache, max-age=0";
	}

	location = /404.html {
		internal;
		add_header Cache-Control "public, max-age=86400" always;
	}

	location = /503.html {
		internal;
		add_header Cache-Control "public, max-age=7200" always;
	}

	location = /503 {
		default_type text/html;
		return 503;
	}

	error_page 503 /503.html;
}
