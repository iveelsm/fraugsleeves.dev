name: Fly Deploy

permissions:
    contents: read
    packages: read

on:
    push:
        branches:
            - main

concurrency:
    group: deploy-production

jobs:
    staging:
        name: Deploy to Staging
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

            - name: Deploy to Staging
              uses: ./.github/actions/deploy-fly
              with:
                  fly-api-token: ${{ secrets.FLY_STAGING_API_TOKEN }}
                  npm-token: ${{ secrets.GITHUB_TOKEN }}
                  cloudflare-zone-id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
                  cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  cloudflare-hosts: '["staging.fraugsleeves.dev"]'
                  fly-config: fly.staging.toml
                  site-url: https://staging.fraugsleeves.dev

    lighthouse:
        name: Lighthouse Validation
        runs-on: ubuntu-latest
        needs: [staging]
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Configure NPM
              run: |
                  echo "@iveelsm:registry=https://npm.pkg.github.com" >> .npmrc
                  echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

            - name: Install dependencies
              run: npm ci

            - name: Run Lighthouse CI
              run: npx lhci autorun --config=lighthouserc.staging.json
              env:
                  LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    deploy:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: [lighthouse]
        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

            - name: Deploy to Production
              uses: ./.github/actions/deploy-fly
              with:
                  fly-api-token: ${{ secrets.FLY_API_TOKEN }}
                  npm-token: ${{ secrets.GITHUB_TOKEN }}
                  cloudflare-zone-id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
                  cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  cloudflare-hosts: '["fraugsleeves.dev", "www.fraugsleeves.dev"]'
                  fly-config: fly.toml
                  site-url: https://fraugsleeves.dev
